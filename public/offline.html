<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b6fb3" />
    <title>Offline | HOME-CELL</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: linear-gradient(160deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }
      .card {
        max-width: 22rem;
        text-align: center;
        background: #fff;
        border-radius: 1.25rem;
        padding: 2rem;
        box-shadow:
          0 4px 6px -1px rgb(15 23 42 / 0.08),
          0 0 0 1px rgb(15 23 42 / 0.04);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 700;
      }
      p {
        margin: 0 0 1.5rem;
        font-size: 0.9rem;
        color: #64748b;
        line-height: 1.5;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.65rem 1.25rem;
        border-radius: 0.75rem;
        background: #0b6fb3;
        color: #fff;
        font-weight: 600;
        font-size: 0.875rem;
        text-decoration: none;
      }
      a:active {
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        HOME-CELL needs an internet connection for live data. Check your
        network and try again.
      </p>
      <a href="/">Back to home</a>
    </div>
  </body>
</html>
